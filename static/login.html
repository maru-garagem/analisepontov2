<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PontoExtract v2 — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/common.js"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-semibold mb-1">PontoExtract v2</h1>
    <p class="text-sm text-slate-500 mb-6">Entre com a senha de acesso.</p>
    <form id="loginForm" class="space-y-4">
      <label class="block">
        <span class="text-sm text-slate-700">Senha</span>
        <input
          type="password"
          name="password"
          required
          autocomplete="current-password"
          class="mt-1 w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </label>
      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition"
      >
        Entrar
      </button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      const password = e.target.password.value;
      try {
        await App.apiPostJson('/api/auth/login', { password });
        location.href = '/';
      } catch (err) {
        if (err.status === 429) {
          App.toast('Muitas tentativas. Aguarde 15 minutos.', 'error');
        } else if (err.status === 401) {
          App.toast('Senha incorreta.', 'error');
        } else {
          App.toast('Erro ao entrar: ' + err.message, 'error');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
