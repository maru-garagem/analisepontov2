services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ponto
      POSTGRES_PASSWORD: ponto_dev
      POSTGRES_DB: pontoextract
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponto -d pontoextract"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override para apontar para o serviço 'db' do compose, já que o .env
      # pode ter uma URL diferente (localhost, Railway, etc).
      DATABASE_URL: postgresql://ponto:ponto_dev@db:5432/pontoextract
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
